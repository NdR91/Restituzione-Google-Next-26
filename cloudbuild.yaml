steps:
  # 1. Build dell'immagine Docker
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/google-next:$COMMIT_SHA'
      - '.'

  # 2. Push su Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/google-next:$COMMIT_SHA'

  # 3. Deploy su Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/google-cloud-cli'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'google-next'
      - '--image=europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/google-next:$COMMIT_SHA'
      - '--region=europe-west1'
      - '--allow-unauthenticated'
      - '--memory=256Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'

images:
  - 'europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/google-next:$COMMIT_SHA'

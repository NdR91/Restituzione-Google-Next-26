<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #fff; font-family: 'Poppins', sans-serif; padding: 20px; }
  .grid { display: flex; gap: 12px; flex-wrap: wrap; }
  .swatch { width: 120px; }
  .color-block { height: 80px; border-radius: 6px; border: 1px solid rgba(0,0,0,0.06); }
  .name { font-size: 11px; font-weight: 600; color: #00121A; margin-top: 6px; }
  .hex  { font-size: 10px; color: #49556D; margin-top: 2px; font-family: monospace; }
  .section-label { font-size: 10px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: #49556D; margin-bottom: 10px; }
  .section { margin-bottom: 18px; }
</style>
</head>
<body>
  <div class="section">
    <div class="section-label">Primary</div>
    <div class="grid">
      <div class="swatch">
        <div class="color-block" style="background:#873BFF;"></div>
        <div class="name">Violet</div>
        <div class="hex">#873BFF</div>
      </div>
      <div class="swatch">
        <div class="color-block" style="background:#00121A;"></div>
        <div class="name">Dark Navy</div>
        <div class="hex">#00121A</div>
      </div>
      <div class="swatch">
        <div class="color-block" style="background:#FFFFFF; border:1px solid #DDE5ED;"></div>
        <div class="name">White</div>
        <div class="hex">#FFFFFF</div>
      </div>
      <div class="swatch">
        <div class="color-block" style="background:#F0F4F7;"></div>
        <div class="name">Off-white</div>
        <div class="hex">#F0F4F7</div>
      </div>
    </div>
  </div>
  <div class="section">
    <div class="section-label">Violet Scale</div>
    <div class="grid">
      <div class="swatch"><div class="color-block" style="background:#EDE5FF;"></div><div class="name">Violet 100</div><div class="hex">#EDE5FF</div></div>
      <div class="swatch"><div class="color-block" style="background:#C9ADFF;"></div><div class="name">Violet 200</div><div class="hex">#C9ADFF</div></div>
      <div class="swatch"><div class="color-block" style="background:#A57AFF;"></div><div class="name">Violet 300</div><div class="hex">#A57AFF</div></div>
      <div class="swatch"><div class="color-block" style="background:#873BFF;"></div><div class="name">Violet 400</div><div class="hex">#873BFF</div></div>
      <div class="swatch"><div class="color-block" style="background:#6B1FE0;"></div><div class="name">Violet 500</div><div class="hex">#6B1FE0</div></div>
      <div class="swatch"><div class="color-block" style="background:#520FAD;"></div><div class="name">Violet 600</div><div class="hex">#520FAD</div></div>
    </div>
  </div>
</body>
</html>

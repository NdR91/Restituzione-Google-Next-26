<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #fff; font-family: 'Poppins', sans-serif; padding: 20px; }
  .grid { display: flex; gap: 12px; flex-wrap: wrap; }
  .swatch { width: 110px; }
  .color-block { height: 80px; border-radius: 6px; border: 1px solid rgba(0,0,0,0.06); }
  .name { font-size: 11px; font-weight: 600; color: #00121A; margin-top: 6px; }
  .hex  { font-size: 10px; color: #49556D; margin-top: 2px; font-family: monospace; }
  .section-label { font-size: 10px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: #49556D; margin-bottom: 10px; }
  .section { margin-bottom: 18px; }
</style>
</head>
<body>
  <div class="section">
    <div class="section-label">Accent / Secondary</div>
    <div class="grid">
      <div class="swatch"><div class="color-block" style="background:#FF7031;"></div><div class="name">Orange</div><div class="hex">#FF7031</div></div>
      <div class="swatch"><div class="color-block" style="background:#FF70F3;"></div><div class="name">Hot Pink</div><div class="hex">#FF70F3</div></div>
      <div class="swatch"><div class="color-block" style="background:#5CD9FF;"></div><div class="name">Cyan</div><div class="hex">#5CD9FF</div></div>
      <div class="swatch"><div class="color-block" style="background:#AAE505;"></div><div class="name">Lime</div><div class="hex">#AAE505</div></div>
      <div class="swatch"><div class="color-block" style="background:#49556D;"></div><div class="name">Slate</div><div class="hex">#49556D</div></div>
      <div class="swatch"><div class="color-block" style="background:#A7BBD8;"></div><div class="name">Blue-Gray</div><div class="hex">#A7BBD8</div></div>
    </div>
  </div>
  <div class="section">
    <div class="section-label">Neutral Scale</div>
    <div class="grid">
      <div class="swatch"><div class="color-block" style="background:#F0F4F7;"></div><div class="name">Gray 100</div><div class="hex">#F0F4F7</div></div>
      <div class="swatch"><div class="color-block" style="background:#DDE5ED;"></div><div class="name">Gray 200</div><div class="hex">#DDE5ED</div></div>
      <div class="swatch"><div class="color-block" style="background:#BCC9D6;"></div><div class="name">Gray 300</div><div class="hex">#BCC9D6</div></div>
      <div class="swatch"><div class="color-block" style="background:#8899AA;"></div><div class="name">Gray 500</div><div class="hex">#8899AA</div></div>
      <div class="swatch"><div class="color-block" style="background:#49556D;"></div><div class="name">Gray 700</div><div class="hex">#49556D</div></div>
      <div class="swatch"><div class="color-block" style="background:#00121A;"></div><div class="name">Gray 900</div><div class="hex">#00121A</div></div>
    </div>
  </div>
</body>
</html>

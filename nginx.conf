server {
    listen       8080;
    server_name  _;

    root    /usr/share/nginx/html;
    index   index.html;
    charset utf-8;

    # Compressione gzip
    gzip on;
    gzip_types text/html text/css application/javascript image/svg+xml;
    gzip_min_length 256;

    # Routing — tutto va a index.html (single page)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache lunga per asset statici (font, immagini, CSS)
    location /dinova/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
